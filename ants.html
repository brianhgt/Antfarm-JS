<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Antfarm JS</title>
<style>
</style>
<link rel="stylesheet" href="main.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<h3>🐜 Antfarm JS 🐜</h3>

<!-- Options Panel -->
<div id="optionsPanel">
  <div id="panelHeader">
    <span>⚙️</span>
  </div>
  <div id="panelContent">
    <div class="option-group">
      <label class="checkbox-label">
        <input type="checkbox" id="showPathsCheck">
        Show Paths
      </label>
    </div>

    <div class="option-group">
      <label>Max Entities: <span id="maxEntitiesValue">2000</span></label>
      <input type="range" id="maxEntitiesSlider" min="5" max="2000" value="2000" step="10">
    </div>

    <div class="option-group">
      <label>Num Spiders: <span id="numSpidersValue">1</span></label>
      <input type="range" id="numSpidersSlider" min="0" max="10" value="1" step="1">
    </div>

    <div class="option-group">
      <label>Food Per Spawn: <span id="foodAmountValue">5</span></label>
      <input type="range" id="foodAmountSlider" min="1" max="50" value="5" step="1">
    </div>

    <div class="option-group">
      <label>Food Frequency: <span id="foodFrequencyValue">20</span></label>
      <input type="range" id="foodFrequencySlider" min="1" max="60" value="20" step="1">
      <div class="option-value">seconds: <span id="foodFrequencySecs">0.3</span></div>
    </div>

    
  </div>
</div>
<div id="controlPanel">
   <button id="viewToggle">📡</button>
   <button id="btn2">B 2</button>
   <button id="btn3">B 3</button>
   <button id="btn4">B 4</button>
   <button id="btn5">B 5</button>
   <button id="btn6">B 6</button>
   <button id="btn7">B 7</button>
   <button id="btn8">B 8</button>
</div>

<canvas id="bg" class="gameCanvas"></canvas>
<canvas id="fg" class="gameCanvas"></canvas>
<canvas id="dbg" class="gameCanvas"></canvas>
<script>
var jq = jQuery.noConflict();

jq(function(){

// ========== OPTIONS PANEL SETUP ==========
let panelExpanded = false;
const optionsPanel = jq('#optionsPanel');
const panelHeader = jq('#panelHeader');
const panelToggle = jq('#panelToggle');
const panelContent = jq('#panelContent');

// Panel expand/collapse
panelHeader.click(function() {
  panelExpanded = !panelExpanded;
  if(panelExpanded) {
    optionsPanel.addClass('expanded');
    panelToggle.text('◀');
  } else {
    optionsPanel.removeClass('expanded');
    panelToggle.text('▶');
  }
});

// ==========================================

//const canvas = jq("#gameCanvas")[0];
//const ctx = canvas.getContext("2d");
const showDebug = true;

const bgCanvas = document.getElementById("bg");
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;
const fgCanvas = document.getElementById("fg");
fgCanvas.width = window.innerWidth;
fgCanvas.height = window.innerHeight;
const dbgCanvas = document.getElementById("dbg");
dbgCanvas.width = window.innerWidth;
dbgCanvas.height = window.innerHeight;

const TILE_SIZE = 20;
let COLS=Math.floor(bgCanvas.width/TILE_SIZE);
let ROWS=Math.floor(bgCanvas.height/TILE_SIZE);
let canvasWidth = COLS * TILE_SIZE;
let canvasHeight = ROWS * TILE_SIZE;

bgCanvas.width = fgCanvas.width = canvasWidth;
bgCanvas.height = fgCanvas.height = canvasHeight;
dbgCanvas.width = canvasWidth;
dbgCanvas.height = canvasHeight;

const bgCtx = bgCanvas.getContext("2d");
const fgCtx = fgCanvas.getContext("2d");
const dbgCtx = dbgCanvas.getContext("2d");

const TILE={ EMPTY:0, DIRT:1, FOOD:2, NEST:3, EGG:4 };
const ANT_TYPE = { QUEEN:0, WORKER:1, SOLDIER:2, FEMALE:3, MALE:4 };
const TILE_OPEN_SPACE = 10;
const SPIDER_CAN_GO_BELOW = false;
const WANDER_DIST = 6;
const EGG_HATCH_TIME = 1000;
const SPIDER_COOLDOWN = 5 * 60; //frames ~Xs * 60fps
const FOOD_SPAWN_INTERVAL = 20 * 60; //frames ~Xs * 60fps
const WORLD_X_MAX = 80; // Each nest is 80 blocks wide
const WORLD_Y_MAX = 160;
const WORLD_Z_MAX = 40;

//const CAMERA_BUFFER = 4; // 4 block buffer on left/right sides

let foodSpawnTimer=FOOD_SPAWN_INTERVAL;
const FOOD_GROUP_SIZE=5;

const OVERWORLD_Y_RATIO = 20; //Number of tiles in the overworld to the next nest section

// Mutable configuration variables
let showDebugPaths = false;
let maxEntities = 2000;
let numSpiders = 1;
let foodSpawnAmount = 5;
let foodSpawnInterval = FOOD_SPAWN_INTERVAL;
let currentView = 'nest'; // 'nest' or 'overworld' or 'both'
let currentNestIndex = 0; // Which nest section we're viewing

// Camera variables
let camera1X = 0;
let camera1Y = 0;

// Connect option panel controls
jq('#showPathsCheck').on('change', function() {
  clearDebug(dbgCtx);
  showDebugPaths = jq(this).is(':checked');
});

jq('#maxEntitiesSlider').on('input', function() {
  maxEntities = parseInt(jq(this).val());
  jq('#maxEntitiesValue').text(maxEntities);
});

jq('#numSpidersSlider').on('input', function() {
  numSpiders = parseInt(jq(this).val());
  jq('#numSpidersValue').text(numSpiders);
  // Adjust spider array
  while(spiders.length < numSpiders) {
    spiders.push({x:Math.random()*COLS,y:Math.random()*TILE_OPEN_SPACE,target:null,path:null,pathIndex:0, timer:EGG_HATCH_TIME, cooldownTimer:SPIDER_COOLDOWN});
  }
  while(spiders.length > numSpiders) {
    spiders.pop();
  }
});

jq('#foodAmountSlider').on('input', function() {
  foodSpawnAmount = parseInt(jq(this).val());
  jq('#foodAmountValue').text(foodSpawnAmount);
});

jq('#foodFrequencySlider').on('input', function() {
  let value = parseInt(jq(this).val());
  jq('#foodFrequencyValue').text(value);
  foodSpawnInterval = value * 60; // convert seconds to frames (@ 60fps)
  jq('#foodFrequencySecs').text((value / 60).toFixed(1));
});

const keys={}; // track keys
jq(document).keydown(e=>keys[e.key]=true);
jq(document).keyup(e=>keys[e.key]=false);

// Handle window resize
window.addEventListener('resize', function() {
  //reset background, foreground, and debug canvas sizes
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  fgCanvas.width = window.innerWidth;
  fgCanvas.height = window.innerHeight;
  dbgCanvas.width = window.innerWidth;
  dbgCanvas.height = window.innerHeight;
  
  // Recalculate columns, rows, and canvas dimensions based on new window size
  COLS = Math.floor(bgCanvas.width / TILE_SIZE);
  ROWS = Math.floor(bgCanvas.height / TILE_SIZE);
  canvasWidth = COLS * TILE_SIZE;
  canvasHeight = ROWS * TILE_SIZE;
  
  bgCanvas.width = fgCanvas.width = canvasWidth;
  bgCanvas.height = fgCanvas.height = canvasHeight;
  dbgCanvas.width = canvasWidth;
  dbgCanvas.height = canvasHeight;
  
  drawBackground(bgCtx);
});


const map=[];
for(let y=0;y<ROWS;y++){
  let row=[]; for(let x=0;x<COLS;x++) row.push(y<TILE_OPEN_SPACE?TILE.EMPTY:TILE.DIRT);
  map.push(row);
}

// // Map by nest section - fixed X,Y,Z
// const nestMaps = [];
// for(let nestIdx = 0; nestIdx < WORLD_Y_MAX/OVERWORLD_Y_RATIO; nestIdx++) {
//   let nestMap = [];
//   for(let y=0;y<ROWS;y++){
//     let row=[]; for(let x=0;x<WORLD_X_MAX;x++) row.push(y<TILE_OPEN_SPACE?TILE.EMPTY:TILE.DIRT);
//     nestMap.push(row);
//   }
//   nestMaps.push(nestMap);
// }

// initial food on surface
let foods = new Map();
for(let i=0;i<foodSpawnAmount;i++){
  let fx=Math.floor(Math.random()*WORLD_X_MAX);
  let fy=Math.floor(Math.random()*WORLD_Y_MAX);
  let fz= 0; //surface level
  foods.set(get3dHash(fx, fy, fz), {x:fx,y:fy,z:fz,carry:false});
}

// Handle view toggle
jq('#viewToggle').on('click', function() {
  if(currentView === 'nest') {
    currentView = 'overworld';
    jq(this).text('🏛️ Nest');
  } else {
    currentView = 'nest';
    jq(this).text('📡 Overworld');
  }
});

// Mouse wheel scrolling for nest view camera
document.addEventListener('wheel', function(e) {
  if(currentView === 'nest') {
    e.preventDefault();
    const screenWidthInBlocks = canvasWidth / TILE_SIZE;
    const screenHeightInBlocks = canvasHeight / TILE_SIZE;
    
    // Increased sensitivity for better control across 80-block nest
    const scrollSensitivity = 0.1;
    
    if(e.deltaX !== 0) {
      camera1X += e.deltaX * scrollSensitivity;
    }
    if(e.deltaY !== 0) {
      camera1Y += e.deltaY * scrollSensitivity;
    }
    
    // Clamp camera to valid range (nest X is ~80 wide, height Z is ~40)
    const maxcamera1X = Math.max(0, WORLD_X_MAX - screenWidthInBlocks);
    const maxcamera1Y = Math.max(0, WORLD_Z_MAX - screenHeightInBlocks);
    
    camera1X = Math.max(0, Math.min(camera1X, maxcamera1X));
    camera1Y = Math.max(0, Math.min(camera1Y, maxcamera1Y));
  }
}, { passive: false });

let spiderScore=0;
const colonies=[
  {name:"A", color:"black", nest:{}, eggs:new Map(), workers:[], soldiers:[], player:{}, score:0, playerTarget:null},
  {name:"B", color:"red", nest:{}, eggs:new Map(), workers:[], soldiers:[], player:{}, score:0, playerTarget:null}
];

// Initialize spiders dynamically
let spiders = [];
for(let i = 0; i < numSpiders; i++) {
  spiders.push({
    x: Math.floor(Math.random() * WORLD_X_MAX),
    y: Math.floor(Math.random() * WORLD_Y_MAX),
    z: 0, //spawn on surface only
    target: null,
    path: null,
    pathIndex: 0,
    timer: EGG_HATCH_TIME,
    cooldownTimer: SPIDER_COOLDOWN
  });
}
const skulls=[];

colonies.forEach((col, colIdx)=>{
  let nx=0, ny=0, nz=0;
  //let nestMap = nestMaps[colIdx];
  //do{
    //subtract 2 for egg spawn distance
    nx = 2 + Math.floor(Math.random()*(WORLD_X_MAX - 4));
    ny = 0; //nests start at opposite sides of the volume
    nz = 2 + 1 + Math.floor(Math.random()*(WORLD_Z_MAX - 4));

    getViewMap()[ny][nx][nz] = TILE.NEST;
    getViewMap()[ny + 1][nx][nz] = TILE.NEST;

  // }while(nestMap[ny] && nestMap[ny][nx] && nestMap[ny][nx]!=TILE.DIRT);
  // if(nestMap[ny] && nestMap[ny][nx] !== undefined) {
  //   nestMap[ny][nx]=TILE.NEST;
  //   nestMap[ny + 1][nx]=TILE.NEST;
  // }
  col.nest={x:nx, y:ny, z:nz, sX:nx, sY:ny+1};
  
  //place player
  col.player={x:nx+0.5, y:ny+0.5, carrying:null};
  
  // spawn egg
  let ex = nx+1, ey = ny, ez = nz; //spawn egg 1 block to the right
  if(getViewMap()[ez][ey][ex] == TILE.DIRT) {
    getViewMap()[ez][ey][ex] = TILE.EMPTY;
    col.eggs.set(get3dHash(ex, ey, ez), {x:ex, y:ey, z:ez, type:ANT_TYPE.WORKER, timer:EGG_HATCH_TIME, carry:false});
  }
});

// click-to-move
document.addEventListener('click', e=>{
  // Don't process clicks on the control or options panel
  if(document.getElementById('optionsPanel').contains(e.target) || 
     document.getElementById('controlPanel').contains(e.target) ||
     e.target.tagName === 'BUTTON') {
    return;
  }
  
  const rect=fgCanvas.getBoundingClientRect();
  let mx=(e.clientX-rect.left)/TILE_SIZE;
  let my=(e.clientY-rect.top)/TILE_SIZE;
  
  // Apply camera offset in nest view
  if(currentView === 'nest') {
    mx += camera1X;
    my = nestIdx;
    mz += camera1Y;
    // Check bounds against nest size
    if(mx >= 0 && mx < WORLD_X_MAX
       && my >= 0 && my < WORLD_Y_MAX
       && mz >= 0 && mz < WORLD_Z_MAX) {
      colonies[0].playerTarget={x:mx, y:my, z:mz};
    }
  } else {
    //Apply camera offset in overworld view
    // Check bounds
    // Now camera is landscape, so Y is horizontal and X is vertical
    mx += camera1Y;
    my += camera1X;
    mz += 0; //any clicks top-down will be surface or nest
    if(mx >= 0 && mx < WORLD_X_MAX
        && my >= 0 && my < WORLD_Y_MAX
        && mz >= 0 && mz < WORLD_Z_MAX) {
      colonies[0].playerTarget={x:mx, y:my, z:mz};
    }
  }
});




function update(){
  foodSpawnTimer--;
  if(foodSpawnTimer<=0){
    foodSpawnTimer=foodSpawnInterval;
    for(let i=0;i<foodSpawnAmount;i++){
      let fx=Math.floor(Math.random()*COLS);
      let fy=Math.floor(Math.random()*TILE_OPEN_SPACE);
      foods.set(get2dHash(fx, fy), {x:fx,y:fy});
    }
  }

  // eggs hatch
  /*
  for(let i=eggs.length-1;i>=0;i--){
    eggs[i].timer--;
    if(eggs[i].timer<=0){
      let col=colonies.find(c=>c.name==eggs[i].colony);
      col.workers.push({x:eggs[i].x+0.5, y:eggs[i].y+0.5, path:null, pathIndex:0});
      map[eggs[i].y][eggs[i].x]=TILE.EMPTY;
      eggs.splice(i,1);
    }
  }
  */
	
    // keyboard
	let dx=0, dy=0;
	let ex=0, ey=0;
	
	//player 1
	if(keys['a'])dx=-0.1;
	if(keys['d'])dx=0.1;
	if(keys['w'])dy=-0.1;
	if(keys['s'])dy=0.1;
	
	// Clamp player 1 to appropriate map bounds
	//let maxX = (currentView === 'nest') ? WORLD_X_MAX - 1 : COLS - 1;
	colonies[0].player.x=Math.max(0,Math.min(WORLD_X_MAX-1,colonies[0].player.x+dx));
	colonies[0].player.y=nestIdx;
	colonies[0].player.z=Math.max(0,Math.min(WORLD_Z_MAX-1,colonies[0].player.z+dz));
	

	
	// pickup/drop with 'e'
	if(keys['e']){
		keys['e']=false; // prevent repeat
		let tx=Math.floor(colonies[0].player.x)
    let ty=nestIdx;
    let tz = Math.floor(colonies[0].player.z);
		let viewMap = getViewMap();
    let block = getBlockAt(tx, ty, tz);
		if(!colonies[0].player.carrying){
		  if(block == TILE.FOOD || block==TILE.EGG){
        colonies[0].player.carrying=getBlockAt(tx, ty, tz);
        setBlock(tx, ty, tz, TILE.EMPTY);
		  }
		}else{
		  if(block==TILE.EMPTY){
        //drop carried item
        setBlock(tx, ty, tz, colonies[0].player.carrying);
        colonies[0].player.carrying = null;
		  }
		}
	}
	

	//player 2
	if(keys['ArrowLeft'])ex = -0.1;
	if(keys['ArrowRight'])ex = 0.1;
	if(keys['ArrowUp'])ey = -0.1;
	if(keys['ArrowDown'])ey = 0.1;
  colonies[1].player.x=Math.max(0,Math.min(WORLD_X_MAX-1,colonies[1].player.x+ex));
	colonies[1].player.y=nestIdx;
	colonies[1].player.z=Math.max(0,Math.min(WORLD_Z_MAX-1,colonies[1].player.z+ey));
		

   colonies.forEach((col,idx)=>{
  
      //hatch eggs
      const eggKeysToDelete = [];
      col.eggs.forEach((egg, key)=>{
         if(egg) {
            egg.timer--;
            if(egg.timer <= 0) {
               // Check entity limit before hatching
               let totalEntities = countTotalEntities();
               if(totalEntities < maxEntities) {
                  if(egg.type == ANT_TYPE.SOLDIER) {
                     col.soldiers.push({x:egg.x+0.5, y:egg.y+0.5, path:null, pathIndex:0, colIdx:idx, type:ANT_TYPE.SOLDIER});
                  }
                  else {
                     col.workers.push({x:egg.x+0.5, y:egg.y+0.5, path:null, pathIndex:0, colIdx:idx, type:ANT_TYPE.WORKER});
                  }
               }
               eggKeysToDelete.push(key);
            }
         }
      });
      eggKeysToDelete.forEach(key => col.eggs.delete(key));
      /*
      for(let i = col.eggs.length-1; i >= 0; i--) {
         col.eggs[i].timer--;
         if(col.eggs[i].timer<=0){
            if(col.eggs[i].type == ANT_TYPE.SOLDIER) {
               col.soldiers.push({x:col.eggs[i].x+0.5, y:col.eggs[i].y+0.5, path:null, pathIndex:0, type:ANT_TYPE.SOLDIER});
            }
            else {
               col.workers.push({x:col.eggs[i].x+0.5, y:col.eggs[i].y+0.5, path:null, pathIndex:0, type:ANT_TYPE.WORKER});
            }
            //map[col.eggs[i].y][col.eggs[i].x] = TILE.EMPTY;
            col.eggs.splice(i,1);
         }
      }
      */
      
      //hatch spiders
      for(let i = spiders.length-1; i >= 0; i--) {
         if(spiders[i].timer >= 0) {
            spiders[i].timer--;
         }
         if(spiders[i].cooldownTimer >= 0) {
            spiders[i].cooldownTimer--;
         }
      }
        
      
       let player = col.player;
       


       // click target
       if(col.playerTarget){
         let ddx=col.playerTarget.x - player.x, ddy=col.playerTarget.y - player.y;
         let dist=Math.sqrt(ddx*ddx+ddy*ddy);
         if(dist>0.1) player.x+=0.1*ddx/dist, player.y+=0.1*ddy/dist;
         else col.playerTarget=null;
       }

      let tx=Math.floor(player.x), ty=Math.floor(player.y);
      let viewMap = getViewMap();
      let maxX = (currentView === 'nest') ? WORLD_X_MAX : COLS;
      //dig
      if(ty >= 0 && ty < ROWS && tx >= 0 && tx < maxX && viewMap[ty] && viewMap[ty][tx]==TILE.DIRT) {
         viewMap[ty][tx]=TILE.EMPTY;
         drawBackground(bgCtx);
      }
      //pickup Egg
      if(!player.carrying && (col.eggs[get2dHash(tx, ty)])){
         player.carrying=TILE.EGG;
         col.eggs[get2dHash(tx, ty)].carry = true;
         //map[ty][tx]=TILE.EMPTY;
      }
      //pickup food
      else if (!player.carrying && (foods.get(get2dHash(tx, ty)))){
         player.carrying = TILE.FOOD;
         foods.delete(get2dHash(tx, ty));
      }
         
      //spawn worker
      if(tx==col.nest.x&&ty==col.nest.y && player.carrying){
         if(player.carrying==TILE.FOOD){ player.score++; spawnEggNearNest(col, ANT_TYPE.WORKER); }
         if(player.carrying==TILE.EGG){
            col.workers.push({x:col.nest.x, y:col.nest.y, carrying:null, target:null, path:null, pathIndex:0, type:ANT_TYPE.WORKER});
         }
         player.carrying=null;
      }
      //spawn soldier
      if(tx==col.nest.sX&&ty==col.nest.sY && player.carrying) {
         if(player.carrying==TILE.FOOD){ player.score++; spawnEggNearNest(col, ANT_TYPE.SOLDIER); }
         if(player.carrying==TILE.EGG) {
            col.soldiers.push({x:col.nest.sX, y:col.nest.sY, carrying:null, target:null, path:null, pathIndex:0, type:ANT_TYPE.SOLDIER});
         }
         player.carrying=null;
      }

      // workers: find food
      col.workers.forEach(ant=>{
         if(!ant.path){
           if(foods.size > 0){
              let target = getRandMap(foods);
              ant.target=target;
              ant.path=findPath(Math.floor(ant.x),Math.floor(ant.y),Math.floor(target.x),Math.floor(target.y));
              ant.pathIndex=0;
           }
           if(!ant.path) {
            let wander=getRandomNearbyEmptyTile(Math.floor(ant.x),Math.floor(ant.y), WANDER_DIST);
            if(wander){
              ant.target=wander;
              ant.path=findPath(Math.floor(ant.x),Math.floor(ant.y),wander.x,wander.y); 
              ant.pathIndex=0;
            }
         }
         }
         if(ant.path && ant.pathIndex<ant.path.length) {
           let next=ant.path[ant.pathIndex];
           let dx=next.x+0.5 - ant.x, dy=next.y+0.5 - ant.y;
           let len=Math.sqrt(dx*dx+dy*dy);
           if(len<0.1){ ant.x=next.x+0.5; ant.y=next.y+0.5; ant.pathIndex++; }
           else{ ant.x+=0.04*dx/len; ant.y+=0.04*dy/len; }
         } else { ant.path=null; }

         let antX = Math.floor(ant.x), antY=Math.floor(ant.y);
         let viewMap = getViewMap();
         let maxX = (currentView === 'nest') ? WORLD_X_MAX : COLS;
         //dig
         if(antY >= 0 && antY < ROWS && antX >= 0 && antX < maxX && viewMap[antY] && viewMap[antY][antX]==TILE.DIRT){
            viewMap[antY][antX]=TILE.EMPTY;
            drawBackground(bgCtx);
         }
         if(!ant.carrying && foods.has(get2dHash(antX, antY))){
            ant.carrying=TILE.FOOD;
            foods.delete(get2dHash(antX, antY));
            
            ant.target={x:col.nest.x,y:col.nest.y};
            ant.path=findPath(antX,antY,col.nest.x,col.nest.y); ant.pathIndex=0;
         }
         
         if(ant.carrying == TILE.FOOD && antX == col.nest.x && antY == col.nest.y) {
            col.score++; ant.carrying=null; ant.target=null; ant.path=null;
            spawnEggNearNest(col, ANT_TYPE.WORKER);
         }
         
      });
      
      // soldiers: find spiders
      col.soldiers.forEach(ant=>{
         if(!ant.path){
           let food=null;
           for(let i=0; i < spiders.length; i++) {
               //if(spiders[i].timer == -1) {
               //   food = {spiders[i].x, spiders[i].y};
               //   break;
               //}
           }
           if(food){
               //let target=food[Math.floor(Math.random()*food.length)];
               ant.target = food;
               ant.path=findPath(Math.floor(ant.x),Math.floor(ant.y),food.x,food.y);
               ant.pathIndex=0;
           }else{
               let wander=getRandomNearbyEmptyTile(Math.floor(ant.x),Math.floor(ant.y),5);
               if(wander){
                 ant.target=wander;
                 ant.path=findPath(Math.floor(ant.x),Math.floor(ant.y),wander.x,wander.y); ant.pathIndex=0;
               }
            }
         }
         if(ant.path && ant.pathIndex<ant.path.length) {
           let next=ant.path[ant.pathIndex];
           let dx=next.x+0.5 - ant.x, dy=next.y+0.5 - ant.y;
           let len=Math.sqrt(dx*dx+dy*dy);
           if(len<0.1){ ant.x=next.x+0.5; ant.y=next.y+0.5; ant.pathIndex++; }
           else{ ant.x+=0.04*dx/len; ant.y+=0.04*dy/len; }
         } else { ant.path=null; }

         let antX = Math.floor(ant.x), antY=Math.floor(ant.y);
         let viewMap = getViewMap();
         //dig

let dirs = [
  {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1},
  {x:1,y:1},{x:1,y:-1},{x:-1,y:1},{x:-1,y:-1}
];

// � A* pathfinding
function findPath(startX, startY, goalX, goalY){
  const open = new MinHeap();
  const openSet = new Set();
  const closed = new Set();
  const cameFrom = {};
  const gScore = {};
  const fScore = {};
  const viewMap = getViewMap();
  
  // Determine map bounds based on actual viewMap size
  const mapWidth = viewMap[0] ? viewMap[0].length : COLS;
  const mapHeight = viewMap.length;

  function key(x,y){ return y * mapWidth + x; }

  let startK = key(startX, startY);
  gScore[startK] = 0;
  fScore[startK] = Math.abs(goalX - startX) + Math.abs(goalY - startY);
  open.push({x: startX, y: startY, f: fScore[startK]});
  openSet.add(startK);

  while (!open.isEmpty()) {
    let current = open.pop();
    let currK = key(current.x, current.y);
    openSet.delete(currK);

    if (current.x === goalX && current.y === goalY) {
      let path = [{x: goalX, y: goalY}];
      while (cameFrom[key(path[0].x, path[0].y)]) {
        path.unshift(cameFrom[key(path[0].x, path[0].y)]);
      }
      return path;
    }

    closed.add(currK);
    for (let d of dirs) {
      let nx = current.x + d.x;
      let ny = current.y + d.y;
      if (nx < 0 || nx >= mapWidth || ny < 0 || ny >= mapHeight) continue;
      if (!viewMap[ny] || !viewMap[ny][nx] || viewMap[ny][nx] == TILE.DIRT) continue;

      let nk = key(nx, ny);
      if (closed.has(nk)) continue;

      let tentativeG = gScore[currK] + 1;
      if (gScore[nk] === undefined || tentativeG < gScore[nk]) {
        cameFrom[nk] = {x: current.x, y: current.y};
        gScore[nk] = tentativeG;
        fScore[nk] = tentativeG + Math.abs(goalX - nx) + Math.abs(goalY - ny);
        if (!openSet.has(nk)) {
          open.push({x: nx, y: ny, f: fScore[nk]});
          openSet.add(nk);
        }
      }
    }
  }

  return null;
}

function getNearestAnt(s) {
	let ants=colonies.flatMap(c=>[c.player,...c.workers]);
    let nearest=null,minDist=999;
    ants.forEach(a=>{
      let dx=a.x - s.x, dy=a.y - s.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<minDist){minDist=d; nearest=a;}
    });
	return nearest?{ant:nearest,dist:minDist}:null;
}

function spawnEggNearNest(col, type){
  let angle=Math.random()*Math.PI*2;
  let ex=col.nest.x+Math.floor(Math.cos(angle)*2);
  let ey=col.nest.y+Math.floor(Math.sin(angle)*2);
  if(ey>=0&&ey<ROWS&&ex>=0&&ex<COLS && (map[ey][ex]==TILE.DIRT||map[ey][ex]==TILE.EMPTY)) {
    // Check if we're at max entities limit
    let totalEntities = countTotalEntities();
    if(totalEntities >= maxEntities) return;
    
    map[ey][ex] = TILE.EMPTY;
	 col.eggs.set(get2dHash(ex,ey), {x:ex, y:ey, type:type, timer:EGG_HATCH_TIME, carry:false});
  }
}

function getRandomNearbyEmptyTile(centerX, centerY, centerZ, radius){
  let tries=10;
  //let viewMap = getViewMap();
  if (!viewMap) return null;
  while(tries-- >0){
    let rx=centerX+Math.floor(Math.random()*radius*2 - radius);
    let ry=centerY+Math.floor(Math.random()*radius*2 - radius);
    let rz=centerZ+Math.floor(Math.random()*radius*2 - radius);
    if(rx>=0&&rx<WORLD_X_MAX
        &&ry>=0&&ry<WORLD_Y_MAX
        &&rz>=0&&rz<WORLD_Z_MAX
        && getBlockAt(ry,rx,rz) != TILE.DIRT) {
      return convertToWorldLocation(rx, ry, rz);
    }

  return null;
}

function blendColor(c1, c2, amount) {
    function hexToRgb(hex) {
        hex = hex.replace("#", "");
        return {
            r: parseInt(hex.substring(0,2), 16),
            g: parseInt(hex.substring(2,4), 16),
            b: parseInt(hex.substring(4,6), 16)
        };
    }
    function rgbToHex(r, g, b) {
        return "#" + 
            r.toString(16).padStart(2, '0') +
            g.toString(16).padStart(2, '0') +
            b.toString(16).padStart(2, '0');
    }

    let rgb1 = hexToRgb(c1);
    let rgb2 = hexToRgb(c2);

    // If the base color is too dark, brighten it slightly before blending
    const brightness = rgb1.r + rgb1.g + rgb1.b;
    if (brightness < 30) {
        rgb1.r = 60;
        rgb1.g = 40;
        rgb1.b = 60;
    }

    let r = Math.round(rgb1.r * (1 - amount) + rgb2.r * amount);
    let g = Math.round(rgb1.g * (1 - amount) + rgb2.g * amount);
    let b = Math.round(rgb1.b * (1 - amount) + rgb2.b * amount);

    return rgbToHex(r, g, b);
}

function toTransparentColor(color, alpha) {
  // Create a temporary canvas to convert any CSS color to RGB
  let tempCtx = document.createElement('canvas').getContext('2d');
  tempCtx.fillStyle = color;
  let computed = tempCtx.fillStyle;

  // computed is now in rgb(...) form
  let match = computed.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!match) return color; // fallback to original color

  let [_, r, g, b] = match;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function hexToRgba(hex, alpha = 1.0) {
  hex = hex.replace(/^#/, '');
  if (hex.length === 3) {
    hex = hex.split('').map(c => c + c).join('');
  }
  const r = parseInt(hex.substring(0,2), 16);
  const g = parseInt(hex.substring(2,4), 16);
  const b = parseInt(hex.substring(4,6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

class MinHeap {
  constructor() { this.items = []; }
  push(node) {
    this.items.push(node);
    this.bubbleUp();
  }
  pop() {
    if (this.items.length < 2) return this.items.pop();
    const top = this.items[0];
    this.items[0] = this.items.pop();
    this.bubbleDown();
    return top;
  }
  bubbleUp() {
    let i = this.items.length - 1;
    while (i > 0) {
      let p = Math.floor((i - 1) / 2);
      if (this.items[i].f >= this.items[p].f) break;
      [this.items[i], this.items[p]] = [this.items[p], this.items[i]];
      i = p;
    }
  }
  bubbleDown() {
    let i = 0;
    const l = this.items.length;
    while (true) {
      let left = 2 * i + 1, right = 2 * i + 2, smallest = i;
      if (left < l && this.items[left].f < this.items[smallest].f) smallest = left;
      if (right < l && this.items[right].f < this.items[smallest].f) smallest = right;
      if (smallest === i) break;
      [this.items[i], this.items[smallest]] = [this.items[smallest], this.items[i]];
      i = smallest;
    }
  }
  isEmpty() { return this.items.length === 0; }
}
